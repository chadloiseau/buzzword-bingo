# Seed data mutation from logs
mutation SeedData @transaction @auth(level: USER, insecureReason: "Seed data operations are typically for development or administrative purposes.") {
  user_insertMany(
    data: [
      {
        displayName: "Alice Smith",
        createdAt: "2023-01-15T10:00:00Z",
        email: "alice.smith@example.com",
      },
      {
        displayName: "Bob Johnson",
        createdAt: "2023-01-16T11:30:00Z",
        email: "bob.johnson@example.com",
      }
    ]
  )
}

# Basic queries
query ListUsers @auth(level: PUBLIC, insecureReason: "User listing is public for lobby management and social features.") {
  users {
    displayName
    email
  }
}

query GetBingoCard($id: UUID!) @auth(level: PUBLIC, insecureReason: "Individual bingo cards are publicly accessible via shared links.") {
  bingoCard(id: $id) {
    id
    title
    theme
  }
}
